<!DOCTYPE html>
<html>
<head>
    <title>Number Operations</title>
</head>
<body>
    <input type="number" id="numberInput" placeholder="Enter an integer">
    <button onclick="calculate()">Calculate</button>
    <p id="result"></p>

    <script>
        function calculate() {
            const n = parseInt(document.getElementById("numberInput").value);
            let result = "";

            // 1. Factorial using a While Loop
            let factorial = 1, i = 1;
            while (i <= n) {
                factorial *= i;
                i++;
            }
            result += `Factorial of ${n}: ${factorial}<br>`;

            // 2. Sum of first n numbers using a Do-While Loop
            let sum = 0, j = 1;
            do {
                sum += j;
                j++;
            } while (j <= n);
            result += `Sum of first ${n} numbers: ${sum}<br>`;

            // 3. Average of first n numbers using a For Loop
            let total = 0;
            for (let k = 1; k <= n; k++) {
                total += k;
            }
            const average = total / n;
            result += `Average of first ${n} numbers: ${average}`;

            document.getElementById("result").innerHTML = result;
        }
    </script>
</body>
</html>
